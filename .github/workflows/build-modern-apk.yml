name: Build Modern Test APK

# Builds an installable Android APK and makes it downloadable, so you can test on a
# phone without a PC. No signing secrets are required: the `android-test-build` profile
# signs with uber-apk-signer's embedded debug keystore (a fixed key), so every build is
# signed identically and can be installed/updated in place.
#
# How to get the APK on your phone:
#   1. Open the repo's "Actions" tab (works in a mobile browser / GitHub app).
#   2. Open the latest "Build Modern Test APK" run (it runs automatically on every push to
#      master, or tap "Run workflow" to start one manually).
#   3. Easiest: open the repo "Releases" -> "Forge Modern Test APK (latest)" and download
#      forge-modern-test.apk directly, then tap it to install (allow "install unknown apps").
#      Alternatively download the "forge-modern-test-apk" artifact (a .zip) from the run.
#
# Note: if you currently have an official Card-Forge build installed, uninstall it first
# (it is signed with a different key). On first launch the app downloads game assets.

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install old maven (3.8.1)
        run: |
          curl -o apache-maven-3.8.1-bin.tar.gz https://archive.apache.org/dist/maven/maven-3/3.8.1/binaries/apache-maven-3.8.1-bin.tar.gz
          tar xf apache-maven-3.8.1-bin.tar.gz
          echo "$PWD/apache-maven-3.8.1/bin" >> "$GITHUB_PATH"
          echo "MAVEN_HOME=$PWD/apache-maven-3.8.1" >> "$GITHUB_ENV"

      - name: Verify maven version
        run: mvn --version

      - name: Set up Android tools
        run: |
          JAVA_HOME=${JAVA_HOME_17_X64} ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --install "build-tools;35.0.0" "platform-tools" "platforms;android-35"

      - name: Install virtual framebuffer (headless GUI support)
        run: command -v Xvfb >/dev/null 2>&1 || { sudo apt update && sudo apt install -y xvfb; }

      - name: Install Android maven plugin and build all modules
        run: |
          mkdir -p ~/.m2/repository/com/simpligility/maven/plugins/android-maven-plugin/4.6.2
          cd ~/.m2/repository/com/simpligility/maven/plugins/android-maven-plugin/4.6.2
          curl -L -o android-maven-plugin-4.6.2.jar https://github.com/Card-Forge/android-maven-plugin/releases/download/4.6.2/android-maven-plugin-4.6.2.jar
          curl -L -o android-maven-plugin-4.6.2.pom https://github.com/Card-Forge/android-maven-plugin/releases/download/4.6.2/android-maven-plugin-4.6.2.pom
          cd -
          mvn install -Dmaven.test.skip=true

      - name: Build signed test APK
        run: |
          export DISPLAY=":1"
          Xvfb :1 -screen 0 800x600x8 &
          export _JAVA_OPTIONS="-Xmx3g"
          mvn -U -B -P android-test-build verify -e -T 1C -Dandroid.sdk.path=$ANDROID_SDK_ROOT -Dandroid.buildToolsVersion=35.0.0 -Dmaven.test.skip=true

      - name: Collect APK
        run: |
          mkdir -p out
          # uber-apk-signer emits an aligned, debug-signed apk; fall back to any apk in target
          APK=$(ls -S forge-gui-android/target/*-aligned*.apk 2>/dev/null | head -n1)
          if [ -z "$APK" ]; then
            APK=$(ls -S forge-gui-android/target/*.apk 2>/dev/null | head -n1)
          fi
          if [ -z "$APK" ]; then
            echo "No APK found in forge-gui-android/target/" >&2
            ls -la forge-gui-android/target/ || true
            exit 1
          fi
          echo "Using APK: $APK"
          cp "$APK" out/forge-modern-test.apk
          ls -la out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-modern-test-apk
          path: out/forge-modern-test.apk
          if-no-files-found: error

      - name: Publish to rolling pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-test-latest
          name: Forge Modern Test APK (latest)
          prerelease: true
          body: |
            Latest test build of the Modern Battle Theme.
            Download `forge-modern-test.apk` below and install it on your Android device
            (enable "install unknown apps" for your browser). Built from commit ${{ github.sha }}.
          files: out/forge-modern-test.apk
